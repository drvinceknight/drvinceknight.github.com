{% extends "base.html" %}

{% block title %}Posts - {{ blog_title }}{% endblock %}

{% block content %}

<h2>Posts</h2>

{% for post in blog_posts %}
<div class="post-entry">
  <p><small>{{ post.date }}</small> &mdash; <a href="/posts/{{ post.slug }}/">{{ post.title }}</a></p>
  {{ post.excerpt }}
</div>
{% endfor %}

{% endblock %}
